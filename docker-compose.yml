services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: your_db_user
      POSTGRES_PASSWORD: your_db_password
      POSTGRES_DB: stock_monitoring
    ports:
      - "50432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

