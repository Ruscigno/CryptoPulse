services:
  db:
    image: postgres:16
    container_name: stock_screener_db
    restart: unless-stopped
    # Credentials come from the environment / .env file — never hardcoded here.
    environment:
      POSTGRES_USER: ${DB_USER:?set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:?set DB_NAME in .env}
    ports:
      # Bind to loopback only — don't expose the database to the network.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
