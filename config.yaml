server:
  port: 8090

collector:
  enabled: true
  use_closed_bars_only: true
  refresh: { intraday: 15m, daily: 6h }

stocks: [AAPL, GOOGL, MSFT, TSLA, AMZN]
timeframes: [15m, 30m, 1h, 4h, 1d, 3d, 1wk, 1mo]

screening:
  match: any
  trend_lookback: 3
  peaks_to_show: 3
  peak_lookback: 3mo
  trend_flat_epsilon: 0

indicators:
  rsi:
    length: 14
    source: close
    smoothing: { type: SMA, length: 14, bb_stddev: 2 }   # captured; reserved (base RSI used for screening)
    detection: { smoothing: 3, min_prominence: 8, min_distance: 30 }    # RSI points
  volume_oscillator:
    short_length: 5
    long_length: 10
    detection: { smoothing: 3, min_prominence: 5, min_distance: 30 }    # %
  distance_from_ma:
    source: close
    ma_type: EMA
    length: 200
    calculation: percent
    detection: { smoothing: 3, min_prominence: 3, min_distance: 30 }    # %
